    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link

      href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"

        <div class="container-fluid">
          <a href="index.html" class="navbar-brand">Ecommerce</a>
          <!-- contador carrito -->
          <div class="position-relative">
            <i class="bi bi-cart3 fs-5"></i>
            <span
              class="badge bg-primary text-dark position-absolute top-0 start-100 translate-middle rounded-pill"
              id="contador-carrito"
              >0</span
            >
          </div>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <!-- icono burger -->
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mx-2 mb-lg-0">
            <li class="nav-item">
              <a href="index.html" class="nav-link">Home</a>
            </li>
            <li class="nav-item">
              <a href="carrito.html" class="nav-link">Carrito</a>
            </li>
            <li class="nav-item">
              <a href="contacto.html" class="nav-link">Contacto</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <main class="container my-5 flex-grow-1">
      <h2 class="text-center mb-4">Tu Carrito</h2>
      <div id="lista-carrito">
        <!-- JS renderiza aquí -->
      </div>
      <div class="text-center mt-4">
        <h4>Total: <span id="total-carrito" class="text-primary">$0</span></h4>
      </div>
    </main>

    <!-- footers -->
    <footer class="py-4 mt-5">
      <div class="container">
        <div class="row text-center text-md-start">
          <div class="col-12 col-md-4 mb-3">
            <h6>E-Gym Fitness</h6>
            <p class="small">Tu tienda de entrenamiento profesional.</p>
          </div>
          <div class="col-12 col-md-4 mb-3">
            <h6>Navegación</h6>
            <ul class="list-unstyled small">
              <li>
                <a href="index.html" class="text-decoration-none">Home</a>
              </li>
              <li>
                <a href="carrito.html" class="text-decoration-none">Carrito</a>
              </li>
              <li>
                <a href="contacto.html" class="text-decoration-none"

              </li>
            </ul>
          </div>
          <div class="col-12 col-md-4 mb-3">
            <h6>Contacto</h6>
            <p class="small mb-0">contacto@egym.cl</p>
            <p class="small">+56 9 1234 5678</p>
          </div>
        </div>
        <hr />
        <p class="text-center small mb-0">
          © 2026 E-Gym Fitness · Temuco, Chile
        </p>

      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"

      crossorigin="anonymous"
